# SPA served by nginx: static assets + client-side-routing fallback. The app calls the backend
# directly at VITE_API_BASE_URL (baked at build time), so nginx does not proxy the API/socket.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache the hashed build assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Client-side routes (e.g. /r/:roomId) have no file on disk → fall back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
