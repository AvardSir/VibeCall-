# LiveKit SFU config for demo2 (NOT --dev). Mounted read-only into the livekit container by
# docker-compose.develop.yml. Values marked CONFIRM must be checked with DevOps for this server.
#
# Keys are injected from env (LIVEKIT_KEYS = "<API_KEY>: <API_SECRET>") so no secret lives in the
# repo — see the compose file. rtc.use_external_ip lets LiveKit advertise the server's public IP for
# ICE candidates.

port: 7880                     # signaling (Traefik routes the WSS subdomain here over `traefik`)
log_level: info

rtc:
  tcp_port: 7881               # ICE/TCP fallback
  port_range_start: 50000      # ICE/UDP range — CONFIRMED open on demo2's firewall (DevOps 2026-07-02);
  port_range_end: 50100        #   the host publishes 50000-50100/udp, so no TURN is needed
  use_external_ip: true        # advertise the server's public IP for ICE (server IP: 167.233.84.103)

# TURN is not used: DevOps confirmed (2026-07-02) the ICE/UDP range above is open, so direct UDP
# (with tcp_port as the fallback) is enough. If a strict-NAT client ever needs a relay, either enable
# LiveKit's embedded TURN (turn.enabled + turn.tls_port + turn.domain — needs a cert) or wire the
# shared demo2 coturn (creds in the demo-server wiki) as external ICE servers.
turn:
  enabled: false

keys: {}                       # populated from LIVEKIT_KEYS env at container start
