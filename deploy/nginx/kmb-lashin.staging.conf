# nginx vhosts for the kmb-lashin demo (develop → dev-* subdomains). Hand this to an ops maintainer
# (Leonid / Denis / Andrey) to place in /etc/nginx/conf.d/ and reload — DO NOT reload nginx yourself.
#
# Wildcard SSL for *.staging.forasoft.com is already on the server. CONFIRM with ops the exact way a
# vhost enables it here (a global include, or an `include /etc/nginx/letsencrypt/ssl.conf;` line as in
# the "specific domain" wiki example). The `listen 443 ssl;` lines below are placeholders for that.
#
# Host ports must match docker-compose.develop.yml AND not collide with other projects
# (check: docker ps -f publish=<port>). Adjust in both places together.

# --- Frontend (static SPA behind nginx in the container) ---
server {
  server_name dev-kmb-lashin.staging.forasoft.com;
  listen 443 ssl;   # + wildcard SSL snippet per ops

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# --- Backend (REST + Socket.IO; needs the WebSocket upgrade + long read timeout) ---
server {
  server_name dev-kmb-lashin-api.staging.forasoft.com;
  listen 443 ssl;   # + wildcard SSL snippet per ops

  location / {
    proxy_pass http://127.0.0.1:3010;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;   # keep long-lived Socket.IO connections alive
    client_max_body_size 12m;   # attachments cap is 10 MB (MAX_ATTACHMENT_BYTES) + overhead
  }
}

# --- LiveKit signaling (WSS → livekit:7880). Media (ICE UDP/TCP + TURN) does NOT go through nginx. ---
server {
  server_name dev-kmb-lashin-livekit.staging.forasoft.com;
  listen 443 ssl;   # + wildcard SSL snippet per ops

  location / {
    proxy_pass http://127.0.0.1:7880;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }
}
