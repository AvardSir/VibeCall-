# CI/CD for kmb-lashin.
#
# Stage 1 (validate) is live: it runs the same gates we run locally — lint, typecheck, tests and a
# production build — for the frontend and backend in parallel, on this project's runner
# (tag: kmb-deploy, docker executor) per fora-soft conventions (https://wiki.fora-soft.com → CI/CD).
#
# Stage 2 (deploy_develop) is wired and ACTIVE, but gated `when: manual` on the `develop` branch — a
# push to develop does NOT auto-deploy; a maintainer runs the job by hand. Before the first run, set
# the develop-scoped CI/CD Variables (LIVEKIT_API_KEY/SECRET, LIVEKIT_URL, CORS_ORIGIN,
# VITE_API_BASE_URL) — see deploy/README.md. Flip `when: manual` → `when: on_success` once verified.

stages:
  - validate
  - deploy

# Defaults shared by the validation jobs: Node 22 (matches the app) on the project's runner.
# tag kmb-deploy = this project's dedicated runner (per DevOps). Assumes a docker executor so `image:`
# applies; if it's a shell executor, validation needs Node on the host instead of an image.
default:
  image: node:22-alpine
  tags:
    - kmb-deploy

# Run validation on merge requests and on the default/integration/working branches. GitLab does NOT
# dedupe branch-vs-MR pipelines on its own, so the guard rule below is required: it skips the
# redundant *branch* pipeline whenever the branch already has an open MR (the MR pipeline covers that
# commit). Order matters — first matching rule wins.
workflow:
  rules:
    # MR pipelines always run for merge requests.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Skip the duplicate branch pipeline when the branch already has an open MR.
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Long-lived environment branches (fora-soft convention) + working branches.
    - if: $CI_COMMIT_BRANCH =~ /^(develop|testing|demo|pre|live)$/
    - if: $CI_COMMIT_BRANCH =~ /^(feat|fix|ci)\//

.node_job:
  stage: validate
  # cache is defined per job below: cache:key:files takes literal paths (no variable expansion),
  # and each package has its own lockfile, so a shared template can't express it.

frontend:
  extends: .node_job
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run lint
    - npm run typecheck
    - npm run test
    - npm run build

backend:
  extends: .node_job
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - backend/node_modules/
  script:
    - cd backend
    - npm ci
    - npm run lint
    - npm run typecheck
    - npm run test
    - npm run build

# --------------------------------------------------------------------------------------------------
# Deploy to demo2 — build + run docker-compose.develop.yml on the kmb-deploy runner (deploys onto the
# host docker; Traefik routes to the containers via the `traefik` network). Gated `when: manual` so a
# push to develop does NOT auto-deploy until the remaining prerequisites are in place (see
# deploy/README.md):
#   - GitLab CI/CD Variables scoped to the develop env: LIVEKIT_API_KEY/SECRET, LIVEKIT_URL,
#     CORS_ORIGIN, VITE_API_BASE_URL (schemes depend on the public HTTPS-vs-HTTP answer);
#   - LiveKit media path (UDP range vs coturn TURN) confirmed with DevOps.
# Routing/TLS is handled by Traefik labels in the compose file — no nginx vhosts.
# Flip `when: manual` → `when: on_success` once the first manual deploy is verified.
deploy_develop:
  stage: deploy
  image: registry.s2.git.fora-soft.com/forasoft/dind
  tags:
    - kmb-deploy
  environment:
    name: develop
    url: https://dev-kmb.stg.forasoft.com
  script:
    - docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
    - docker-compose --compatibility -p kmb-lashin_${CI_COMMIT_REF_NAME}
        -f docker-compose.develop.yml up -d --build --force-recreate
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual
