# CI/CD for kmb-lashin.
#
# Stage 1 (validate) is live: it runs the same gates we run locally — lint, typecheck, tests and a
# production build — for the frontend and backend in parallel, on the shared demo2 runner
# (tag: demoserver-2) per fora-soft conventions (https://wiki.fora-soft.com → CI/CD).
#
# Stage 2 (deploy to demo2) is scaffolded but DISABLED (see the commented `.deploy`/`deploy_demo`
# block at the bottom). Enabling it needs, on the GitLab side (maintainer rights required):
#   - a `demo` environment + CI/CD Variables (LIVEKIT_API_KEY/SECRET/URL, etc.), scoped per env;
#   - a demo branch to trigger on;
#   - a production compose (docker-compose.demo.yml) + prod Dockerfiles, and a decision on how the
#     LiveKit SFU is hosted on demo2 (public WSS/TLS + UDP/TURN) — the dev compose won't serve demo.

stages:
  - validate
  - deploy

# Defaults shared by the validation jobs: Node 22 (matches the app) on the project's runner.
# tag kmb-deploy = this project's dedicated runner (per DevOps). Assumes a docker executor so `image:`
# applies; if it's a shell executor, validation needs Node on the host instead of an image.
default:
  image: node:22-alpine
  tags:
    - kmb-deploy

# Run validation on merge requests and on the default/integration branches — not twice for the same
# commit (branch pipeline is skipped when an MR pipeline exists).
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Long-lived environment branches (fora-soft convention) + working branches.
    - if: $CI_COMMIT_BRANCH =~ /^(develop|testing|demo|pre|live)$/
    - if: $CI_COMMIT_BRANCH =~ /^(feat|fix|ci)\//

.node_job:
  stage: validate
  # cache is defined per job below: cache:key:files takes literal paths (no variable expansion),
  # and each package has its own lockfile, so a shared template can't express it.

frontend:
  extends: .node_job
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run lint
    - npm run typecheck
    - npm run test
    - npm run build

backend:
  extends: .node_job
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - backend/node_modules/
  script:
    - cd backend
    - npm ci
    - npm run lint
    - npm run typecheck
    - npm run test
    - npm run build

# --------------------------------------------------------------------------------------------------
# Deploy to demo2 — build + run docker-compose.develop.yml on the kmb-deploy runner (deploys onto the
# host docker; Traefik routes to the containers via the `traefik` network). Gated `when: manual` so a
# push to develop does NOT auto-deploy until the remaining prerequisites are in place (see
# deploy/README.md):
#   - GitLab CI/CD Variables scoped to the develop env: LIVEKIT_API_KEY/SECRET, LIVEKIT_URL,
#     CORS_ORIGIN, VITE_API_BASE_URL (schemes depend on the public HTTPS-vs-HTTP answer);
#   - LiveKit media path (UDP range vs coturn TURN) confirmed with DevOps.
# Routing/TLS is handled by Traefik labels in the compose file — no nginx vhosts.
# Flip `when: manual` → `when: on_success` once the first manual deploy is verified.
deploy_develop:
  stage: deploy
  image: registry.s2.git.fora-soft.com/forasoft/dind
  tags:
    - kmb-deploy
  environment:
    name: develop
    url: https://dev-kmb.stg.forasoft.com
  script:
    - docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
    - docker-compose --compatibility -p kmb-lashin_${CI_COMMIT_REF_NAME}
        -f docker-compose.develop.yml up -d --build --force-recreate
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual
